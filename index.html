<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Peer Pressure</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Space Mono', monospace;
      touch-action: none;
    }
    
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    
    #ui-overlay {
      position: absolute;
      top: 12px;
      left: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 11px;
      pointer-events: none;
      text-shadow: 0 0 4px rgba(0,0,0,0.8);
      user-select: none;
    }

    #restart-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: white;
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      cursor: pointer;
      display: none;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
    }

    #restart-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      border-color: white;
    }
  </style>
</head>

  <canvas id="game-canvas"></canvas>
